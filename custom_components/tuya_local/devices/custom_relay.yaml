name: Relay
products:
  - id: eb182144a76de0eabefrip
    manufacturer: Generic
    model: Relay
entities:
  - entity: switch
    name: Switch
    category: config
    dps:
      - id: 1
        type: boolean
        name: switch
  - entity: sensor
    name: Current
    class: current
    category: diagnostic
    dps:
      - id: 18
        type: integer
        name: Current
        unit: mA
        class: measurement
        mapping:
          - scale: 0
  - entity: sensor
    class: power
    category: diagnostic
    dps:
      - id: 19
        type: integer
        optional: true
        name: power
        unit: W
        class: measurement
        mapping:
          - scale: 1
  - entity: sensor
    name: voltage
    class: voltage
    category: diagnostic
    dps:
      - id: 20
        type: integer
        name: voltage
        unit: V
        class: measurement
        mapping:
          - scale: 1